<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media | EUNSU</title>
  <meta
    name="description"
    content="Media page of EUNSU commercial model portfolio."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="site-wrap">
    <header class="site-header" id="siteHeader">
      <div class="header-left">
        <a href="index.html" class="logo">EUNSU</a>

        <div class="social-links" aria-label="Social links">
          <a
            href="https://www.instagram.com/eunnhada"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram"
          >
            <i class="fa-brands fa-instagram"></i>
          </a>

          <a
            href="https://www.youtube.com/@%EC%9D%80%EC%88%98%ED%95%98%EB%8B%A4"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="YouTube"
          >
            <i class="fa-brands fa-youtube"></i>
          </a>
        </div>
      </div>

      <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="mainNav" aria-label="Main navigation">
        <a href="profile.html">PROFILE</a>
        <a href="portfolio.html">PORTFOLIO</a>
        <a href="media.html">MEDIA</a>
        <a href="project.html">PROJECT</a>
        <a href="contact.html">CONTACT</a>
      </nav>
    </header>

    <main>
      <section class="preview-section">
        <div class="section-head">
          <p class="section-kicker">MEDIA</p>
          <h2>Short-form visuals, selected reels, and video moments.</h2>
        </div>

        <div class="contact-info">
          <p>
            A collection of Instagram clips, YouTube videos, and moving image
            content.
          </p>
        </div>
      </section>

      <section class="preview-section">
        <div class="media-preview-box media-page-grid">
          <a
            href="https://www.instagram.com/reel/DJjTFc3T1JN/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
            target="_blank"
            rel="noopener noreferrer"
            class="media-item"
          >
            <div class="media-thumb">
              <img src="assets/images/13.jpg" alt="Instagram reel preview 1" />
            </div>
            <div class="media-meta">
              <p class="media-type">INSTAGRAM</p>
              <h3>Selected Reel 01</h3>
            </div>
          </a>

          <a
            href="https://www.instagram.com/p/C_WuH2BTQtq/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
            target="_blank"
            rel="noopener noreferrer"
            class="media-item"
          >
            <div class="media-thumb">
              <img src="assets/images/21.jpg" alt="Instagram reel preview 2" />
            </div>
            <div class="media-meta">
              <p class="media-type">INSTAGRAM</p>
              <h3>Selected Reel 02</h3>
            </div>
          </a>

          <a
            href="https://www.youtube.com/watch?v=Gtkook9JgLo"
            target="_blank"
            rel="noopener noreferrer"
            class="media-item"
          >
            <div class="media-thumb">
              <img src="assets/images/20.jpg" alt="YouTube preview 1" />
            </div>
            <div class="media-meta">
              <p class="media-type">YOUTUBE</p>
              <h3>Selected Video 01</h3>
            </div>
          </a>

          <a
            href="https://www.youtube.com/watch?v=-5LXrYdTkW4&t=158s"
            target="_blank"
            rel="noopener noreferrer"
            class="media-item"
          >
            <div class="media-thumb">
              <img src="assets/images/14.jpg" alt="YouTube preview 2" />
            </div>
            <div class="media-meta">
              <p class="media-type">YOUTUBE</p>
              <h3>Selected Video 02</h3>
            </div>
          </a>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/script.js"></script>
